    <!-- Google Analytics GA4
         Measurement ID is injected at build time from VITE_GA_MEASUREMENT_ID.
         Do NOT hardcode the ID here — Vite replaces the env var at build time. -->

    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', '%VITE_GA_MEASUREMENT_ID%');
    </script>
